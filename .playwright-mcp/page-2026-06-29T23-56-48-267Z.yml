    - generic [ref=f1e62]:
      - paragraph [ref=f1e63]: Tại nanoHome, chúng tôi tin vào “sống đẹp mỗi ngày” từ những khoảnh khắc bình dị đến những dịp đặc biệt.
      - generic [ref=f1e64]:
        - paragraph [ref=f1e65]: nanoHome là nhà phân phối chính thức của nhiều thương hiệu nội thất, ánh sáng và vật liệu cao cấp như Cassina, Malxato, Knoll, B&B Italia, Fritz Hansen, Vitra, USM và Flos.
        - paragraph [ref=f1e66]: Showroom nanoHome được xây dựng như một điểm đến trải nghiệm, nơi khách hàng, kiến trúc sư và nhà thiết kế có thể chạm vào vật liệu, ánh sáng và tinh thần sống đẹp.
    - generic [ref=f1e67]:
      - generic [ref=f1e68]:
        - heading "Giá trị cốt lõi của nanoHome" [level=2] [ref=f1e69]
        - generic [ref=f1e70]:
          - article [ref=f1e71]:
            - heading "Tiên phong – Pioneering" [level=3] [ref=f1e72]
            - paragraph [ref=f1e73]: "Từ ngày đầu thành lập, nanoHome đã chọn con đường tiên phong: kết nối trực tiếp với các thương hiệu nội thất châu Âu, đưa tiêu chuẩn nguyên bản vào không gian sống Việt Nam."
            - paragraph [ref=f1e74]: “Nhà bán lẻ nội thất cao cấp đầu tiên và duy nhất tại Việt Nam hợp tác trực tiếp với nhiều thương hiệu biểu tượng của châu Âu.”
          - article [ref=f1e75]:
            - heading "Nguyên bản – Authentic" [level=3] [ref=f1e76]
            - paragraph [ref=f1e77]: Mỗi sản phẩm được tuyển chọn dựa trên nguồn gốc, chất lượng, câu chuyện thiết kế và khả năng đồng hành lâu dài với người sử dụng.
            - paragraph [ref=f1e78]: “Sự sang trọng bền vững bắt đầu từ tính nguyên bản.”
          - article [ref=f1e79]:
            - heading "Chăm sóc – Caring" [level=3] [ref=f1e80]
            - paragraph [ref=f1e81]: nanoHome không chỉ bán sản phẩm. Chúng tôi tư vấn, hoàn thiện, bảo hành và chăm sóc trải nghiệm sống đẹp trong từng chi tiết.
            - paragraph [ref=f1e82]: “Một không gian đẹp cần được chăm sóc như một mối quan hệ lâu dài.”
      - img "Chi tiết không gian sống nanoHome" [ref=f1e84]
